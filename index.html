<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flèche-moi ça</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="xp-desktop">
    <div class="xp-window">

      <div class="xp-titlebar">
        <div class="xp-title">Flèche-moi ça.exe</div>

        <div class="xp-window-buttons">
          <button aria-label="Réduire">_</button>
          <button aria-label="Agrandir">□</button>
          <button aria-label="Fermer">×</button>
        </div>
      </div>

      <div class="xp-menu-bar">
        <span>Fichier</span>
        <span>Grille</span>
        <span>Classement</span>
        <span>Aide</span>
      </div>

      <header class="xp-header">
        <h1>Flèche-moi ça 🧩</h1>
      </header>

      <main class="container">
        <section class="card">
          <h2>Bienvenue sur le site</h2>

          <p>
            Ça arrive bientôt ! En attendant, tu peux envoyer un Wizz.
          </p>

          <p class="wizz-counter">
            Wizz envoyés : <span id="wizz-count">0</span>
          </p>

          <button class="xp-button wizz-button" id="wizz-button" type="button">
            ≋ 😄 ≋
          </button>
        </section>
      </main>

      <footer class="site-footer">
        <p>
          © 2026 Flèche-moi ça ·
          <a href="mailto:contact@flechemoica.fr">Contact</a> ·
          <a href="/mentions-legales.html">Mentions légales</a>
        </p>
      </footer>

    </div>
  </div>
  <script>
    const wizzButton = document.getElementById('wizz-button');
    const wizzCount = document.getElementById('wizz-count');
    const storageKey = 'flechemoica-wizz-count';

    let count = Number(localStorage.getItem(storageKey) || 0);
    wizzCount.textContent = count;

    wizzButton.addEventListener('click', () => {
      count += 1;
      localStorage.setItem(storageKey, count);
      wizzCount.textContent = count;

      document.body.classList.remove('wizzing');
      void document.body.offsetWidth;
      document.body.classList.add('wizzing');

      setTimeout(() => {
        document.body.classList.remove('wizzing');
      }, 600);
    });
  </script>
</body>
</html>
